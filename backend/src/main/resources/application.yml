# ===== 服务配置 =====
server:
  port: 8080

# ===== Spring 应用配置 =====
spring:
  application:
    name: product-manager

  # Jackson JSON 序列化配置
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

